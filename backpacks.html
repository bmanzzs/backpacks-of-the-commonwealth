<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backpacks of the Commonwealth</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #39ff14;
    --green-dim: #1a7a08;
    --green-glow: rgba(57,255,20,0.3);
    --amber: #ffb000;
    --amber-dim: #7a5200;
    --red: #ff4444;
    --bg: #050f03;
    --bg2: #090f07;
    --card-bg: #0a160a;
    --border: #1e3a1e;
    --text-dim: #4a7a4a;
    --scanline: rgba(0,0,0,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* CRT flicker */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  /* Noise texture */
  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9997;
  }

  header {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
  }

  .pip-logo {
    font-family: 'VT323', monospace;
    font-size: clamp(14px, 2vw, 18px);
    color: var(--amber);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.8;
    animation: flicker 8s infinite;
  }

  .main-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 6vw, 72px);
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--green);
    text-shadow:
      0 0 20px var(--green),
      0 0 40px var(--green-glow),
      0 0 80px rgba(57,255,20,0.1);
    line-height: 1;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  .subtitle {
    font-family: 'VT323', monospace;
    font-size: clamp(18px, 3vw, 28px);
    color: var(--amber);
    letter-spacing: 8px;
    margin-top: 12px;
    text-shadow: 0 0 10px var(--amber);
  }

  .divider {
    width: 100%;
    max-width: 900px;
    margin: 30px auto;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    box-shadow: 0 0 10px var(--green-glow);
    position: relative;
  }

  .divider::before, .divider::after {
    content: '◆';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--amber);
    font-size: 14px;
  }
  .divider::before { left: 20px; }
  .divider::after { right: 20px; }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin: 0 auto 40px;
    max-width: 800px;
    padding: 0 20px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--amber);
    text-shadow: 0 0 15px var(--amber);
    display: block;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    position: relative;
    overflow: visible;
    cursor: crosshair;
    transition: border-color 0.2s, box-shadow 0.2s;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(57,255,20,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .card:hover {
    border-color: var(--green);
    box-shadow: 0 0 20px var(--green-glow), inset 0 0 20px rgba(57,255,20,0.05);
    z-index: 100;
  }

  .card-inner {
    padding: 18px;
  }

  /* Level badge */
  .level-badge {
    position: absolute;
    top: -1px;
    right: 20px;
    background: var(--green);
    color: var(--bg);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 10px;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 8px 100%);
  }

  /* Number */
  .card-num {
    font-family: 'VT323', monospace;
    font-size: 44px;
    color: var(--green-dim);
    line-height: 1;
    position: absolute;
    top: 14px;
    left: 18px;
    pointer-events: none;
  }

  /* Card header */
  .card-header {
    padding-left: 44px;
    min-height: 52px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .card-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height: 1.3;
  }

  .card-id {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 3px;
  }

  /* Quick stats row */
  .quick-stats {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .qs-chip {
    font-family: 'VT323', monospace;
    font-size: 16px;
    padding: 2px 8px;
    border: 1px solid;
    line-height: 1.4;
  }

  .qs-cc { border-color: var(--green); color: var(--green); }
  .qs-dr { border-color: #4488ff; color: #4488ff; }
  .qs-wt { border-color: var(--amber-dim); color: var(--amber); }
  .qs-val { border-color: #996600; color: #cc9900; }

  /* Hover tooltip panel */
  .tooltip {
    position: absolute;
    left: calc(100% + 10px);
    top: 0;
    width: 320px;
    background: #040d04;
    border: 1px solid var(--green);
    box-shadow: 0 0 30px var(--green-glow), 0 0 60px rgba(57,255,20,0.1);
    opacity: 0;
    pointer-events: none;
    transform: translateX(-8px);
    transition: opacity 0.18s, transform 0.18s;
    z-index: 200;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }

  .card:hover .tooltip {
    opacity: 1;
    transform: translateX(0);
  }

  /* Adjust for cards on right side */
  .card:nth-child(3n) .tooltip,
  .card:nth-child(3n+2) .tooltip {
    left: auto;
    right: calc(100% + 10px);
    transform: translateX(8px);
  }
  .card:nth-child(3n) .tooltip:hover,
  .card:nth-child(3n+2) .tooltip:hover {
    transform: translateX(0);
  }
  .card:nth-child(3n):hover .tooltip,
  .card:nth-child(3n+2):hover .tooltip {
    transform: translateX(0);
  }

  .tt-header {
    background: var(--green);
    color: var(--bg);
    padding: 10px 14px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .tt-level-tag {
    background: var(--bg);
    color: var(--green);
    padding: 2px 8px;
    font-size: 9px;
    letter-spacing: 2px;
  }

  .tt-body {
    padding: 14px;
  }

  .tt-desc {
    font-family: 'VT323', monospace;
    font-size: 17px;
    color: #aaddaa;
    line-height: 1.4;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .tt-section-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
    margin-top: 12px;
  }

  .tt-section-label:first-of-type { margin-top: 0; }

  .tt-stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .tt-stat {
    display: flex;
    flex-direction: column;
  }

  .tt-stat-key {
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .tt-stat-val {
    font-family: 'VT323', monospace;
    font-size: 20px;
    line-height: 1.2;
  }

  .tt-stat-val.green { color: var(--green); text-shadow: 0 0 8px var(--green-glow); }
  .tt-stat-val.blue { color: #66aaff; }
  .tt-stat-val.amber { color: var(--amber); }
  .tt-stat-val.red { color: var(--red); }
  .tt-stat-val.purple { color: #cc88ff; }

  .upgrades-list {
    list-style: none;
  }

  .upgrades-list li {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #88bb88;
    padding: 3px 0;
    border-bottom: 1px solid rgba(30,58,30,0.5);
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .upgrades-list li:last-child { border-bottom: none; }

  .upgrades-list li::before {
    content: '▶';
    color: var(--green-dim);
    font-size: 10px;
    flex-shrink: 0;
  }

  .special-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .special-pill {
    font-family: 'VT323', monospace;
    font-size: 15px;
    padding: 2px 7px;
    border: 1px solid;
  }

  .special-pill.buff { border-color: #44aa44; color: #66cc66; }
  .special-pill.nerf { border-color: #aa4444; color: #cc6666; }
  .special-pill.neutral { border-color: #446688; color: #6699cc; }

  .colors-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .color-tag {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    padding: 2px 6px;
    text-transform: uppercase;
  }

  .location-box {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #55aa55;
    padding: 8px 10px;
    background: rgba(57,255,20,0.04);
    border-left: 2px solid var(--green-dim);
    margin-top: 10px;
    word-break: break-all;
  }

  /* Bottom bar */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .location-snippet {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .hover-hint {
    font-size: 8px;
    color: var(--green-dim);
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  /* Flicker animation */
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
    98% { opacity: 0.7; }
    99% { opacity: 1; }
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-glow), 0 0 80px rgba(57,255,20,0.1); }
    50% { text-shadow: 0 0 30px var(--green), 0 0 60px rgba(57,255,20,0.5), 0 0 100px rgba(57,255,20,0.2); }
  }

  @keyframes scanin {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    animation: scanin 0.4s ease both;
  }

  /* stagger */
  .card:nth-child(1)  { animation-delay: 0.02s }
  .card:nth-child(2)  { animation-delay: 0.04s }
  .card:nth-child(3)  { animation-delay: 0.06s }
  .card:nth-child(4)  { animation-delay: 0.08s }
  .card:nth-child(5)  { animation-delay: 0.10s }
  .card:nth-child(6)  { animation-delay: 0.12s }
  .card:nth-child(7)  { animation-delay: 0.14s }
  .card:nth-child(8)  { animation-delay: 0.16s }
  .card:nth-child(9)  { animation-delay: 0.18s }
  .card:nth-child(10) { animation-delay: 0.20s }
  .card:nth-child(11) { animation-delay: 0.22s }
  .card:nth-child(12) { animation-delay: 0.24s }
  .card:nth-child(13) { animation-delay: 0.26s }
  .card:nth-child(14) { animation-delay: 0.28s }
  .card:nth-child(15) { animation-delay: 0.30s }
  .card:nth-child(16) { animation-delay: 0.32s }
  .card:nth-child(17) { animation-delay: 0.34s }
  .card:nth-child(18) { animation-delay: 0.36s }
  .card:nth-child(19) { animation-delay: 0.38s }
  .card:nth-child(20) { animation-delay: 0.40s }
  .card:nth-child(21) { animation-delay: 0.42s }
  .card:nth-child(22) { animation-delay: 0.44s }
  .card:nth-child(23) { animation-delay: 0.46s }
  .card:nth-child(24) { animation-delay: 0.48s }
  .card:nth-child(25) { animation-delay: 0.50s }
  .card:nth-child(26) { animation-delay: 0.52s }

  /* Version tag */
  .version-badge {
    display: inline-block;
    margin-top: 14px;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--green-dim);
    border: 1px solid var(--green-dim);
    padding: 4px 14px;
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    border-top: 1px solid var(--border);
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Responsive: hide tooltip on mobile, show inline */
  @media (max-width: 700px) {
    .tooltip {
      display: none;
    }
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>

function specialClass(s) {
  if (!s) return 'neutral';
  if (s.startsWith('-')) return 'nerf';
  if (s.startsWith('+')) return 'buff';
  return 'neutral';
}

function renderCard(bp) {
  const specials = bp.special.map(s =>
    `<span class="special-pill ${specialClass(s)}">${s}</span>`
  ).join('');

  const upgrades = bp.upgrades.map(u =>
    `<li>${u}</li>`
  ).join('');

  const colors = bp.colors.map(c =>
    `<span class="color-tag">${c}</span>`
  ).join('');

  const isHighLevel = bp.level >= 50;
  const isMaxLevel = bp.level >= 60;

  return `
  <div class="card">
    <div class="level-badge">LVL ${bp.level}</div>
    <div class="card-inner">
      <div class="card-num">${String(bp.num).padStart(2,'0')}</div>
      <div class="card-header">
        <div class="card-name">${bp.name}</div>
        <div class="card-id">${bp.id}</div>
      </div>

      <div class="quick-stats">
        <span class="qs-chip qs-cc">${bp.cc.split('/')[0].trim()}</span>
        <span class="qs-chip qs-dr">${bp.dr.split('→')[0].trim()}</span>
        <span class="qs-chip qs-wt">${bp.weight}</span>
        <span class="qs-chip qs-val">${bp.value}</span>
      </div>

      <div class="card-footer">
        <div class="location-snippet">${bp.location.split('—')[0].trim()}</div>
        <div class="hover-hint">◉ HOVER</div>
      </div>
    </div>

    <!-- TOOLTIP -->
    <div class="tooltip">
      <div class="tt-header">
        <span>${bp.name}</span>
        <span class="tt-level-tag">LVL ${bp.level}</span>
      </div>
      <div class="tt-body">
        <div class="tt-desc">${bp.desc}</div>

        <div class="tt-section-label">▸ Base Statistics</div>
        <div class="tt-stat-grid">
          <div class="tt-stat">
            <span class="tt-stat-key">Carry Weight</span>
            <span class="tt-stat-val green">${bp.cc}</span>
          </div>
          <div class="tt-stat">
            <span class="tt-stat-key">Damage Resist</span>
            <span class="tt-stat-val blue">${bp.dr}</span>
          </div>
          <div class="tt-stat">
            <span class="tt-stat-key">Weight</span>
            <span class="tt-stat-val amber">${bp.weight}</span>
          </div>
          <div class="tt-stat">
            <span class="tt-stat-key">Value</span>
            <span class="tt-stat-val amber">${bp.value}</span>
          </div>
        </div>

        ${bp.special.length > 0 ? `
        <div class="tt-section-label">▸ SPECIAL Effects</div>
        <div class="special-pills">${specials}</div>
        ` : ''}

        <div class="tt-section-label">▸ Upgrade Tiers</div>
        <ul class="upgrades-list">${upgrades}</ul>

        <div class="tt-section-label">▸ Crafting Requirements</div>
        <div class="location-box" style="font-size:14px;color:#88aa88;">${bp.crafting}</div>

        ${bp.colors.length > 0 ? `
        <div class="tt-section-label">▸ Available Colors</div>
        <div class="colors-row">${colors}</div>
        ` : ''}

        <div class="tt-section-label">▸ World Location</div>
        <div class="location-box">${bp.location}</div>
      </div>
    </div>
  </div>`;
}

document.getElementById('grid').innerHTML = BACKPACKS.map(renderCard).join('');
</script>
